<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#4f46e5" />
  <title>ReleaseFlow — Offline</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #0b1120; color: #e2e8f0;
    }
    .card {
      max-width: 24rem; padding: 2rem; border-radius: 1rem;
      border: 1px solid rgba(148,163,184,.2); background: #111827; text-align: center;
    }
    h1 { font-size: 1.25rem; margin: 0 0 .5rem; color: #a5b4fc; }
    p { margin: 0 0 1.25rem; color: #94a3b8; font-size: .875rem; line-height: 1.5; }
    button {
      appearance: none; border: 0; border-radius: .5rem; padding: .6rem 1rem;
      background: #4f46e5; color: white; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icons/ReleaseFlow-Logo.svg" width="88" height="88" alt="ReleaseFlow" style="display:block;margin:0 auto 1rem;width:88px;height:auto" />
    <h1>You're offline</h1>
    <p>ReleaseFlow can't reach the network right now. Cached pages and recently viewed work may still open from the installed app shell.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
